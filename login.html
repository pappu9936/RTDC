<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Login Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bgmove 10s infinite alternate;
        }
        @keyframes bgmove {
            0% {background-position: left;}
            100% {background-position: right;}
        }
        .container {
            background: rgba(255,255,255,0.85);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px 30px;
            width: 350px;
            position: relative;
            overflow: hidden;
            animation: popin 1s;
        }
        @keyframes popin {
            0% {transform: scale(0.7);}
            100% {transform: scale(1);}
        }
        h2 {
            text-align: center;
            color: #ff6f91;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 2px;
            animation: colorchange 2s infinite alternate;
        }
        @keyframes colorchange {
            0% {color: #ff6f91;}
            100% {color: #845ec2;}
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #845ec2;
            font-weight: 500;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #d1d1d1;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border: 1.5px solid #ff6f91;
            outline: none;
        }
        .remember {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }
        .remember input {
            margin-right: 8px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff6f91 0%, #845ec2 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.3s;
            box-shadow: 0 2px 8px rgba(132,94,194,0.15);
        }
        .btn:hover {
            background: linear-gradient(90deg, #845ec2 0%, #ff6f91 100%);
        }
        .change-btn {
            background: linear-gradient(90deg, #f9f871 0%, #ff6f91 100%);
            color: #845ec2;
            margin-bottom: 0;
        }
        .error {
            color: #ff1744;
            text-align: center;
            margin-bottom: 10px;
            font-size: 15px;
            animation: shake 0.3s;
        }
        @keyframes shake {
            0% {transform: translateX(0);}
            25% {transform: translateX(-5px);}
            50% {transform: translateX(5px);}
            75% {transform: translateX(-5px);}
            100% {transform: translateX(0);}
        }
        .success {
            color: #43ea7c;
            text-align: center;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .hidden {
            display: none;
        }
        .change-form {
            animation: popin 0.5s;
        }
    </style>
</head>
<body>
    <div class="container" id="login-container">
        <h2>Login</h2>
        <div id="message"></div>
        <form id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required>
            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember" style="margin-bottom:0;">Remember me</label>
            </div>
            <button type="submit" class="btn">Submit</button>
        </form>
        <button class="btn change-btn" id="change-btn" type="button">Change Username or Password</button>
    </div>

    <div class="container hidden" id="change-container">
        <h2>Change Credentials</h2>
        <div id="change-message"></div>
        <form id="change-form" class="change-form">
            <label for="old-username">Old Username</label>
            <input type="text" id="old-username" required>
            <label for="old-password">Old Password</label>
            <input type="password" id="old-password" required>
            <label for="new-username">New Username</label>
            <input type="text" id="new-username" required>
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" required>
            <button type="submit" class="btn">Change</button>
            <button type="button" class="btn change-btn" id="back-btn">Back to Login</button>
        </form>
    </div>
    <!-- After successful login, a link to 'welcome.html' is shown via JavaScript above. 
    If you want a static link always visible, add below: -->
    <a href="form.html" id="welcome-link" style="display:none;">Go to Welcome Page</a>

    <script>
        // Default credentials
        let credentials = JSON.parse(localStorage.getItem('loginCreds')) || {username: 'pappu', password: '5522'};
        // Remembered credentials
        if(localStorage.getItem('remembered')) {
            document.getElementById('username').value = credentials.username;
            document.getElementById('password').value = credentials.password;
            document.getElementById('remember').checked = true;
        }

        // Login form submit
        document.getElementById('login-form').onsubmit = function(e) {
            e.preventDefault();
            const uname = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            if(uname === credentials.username && pwd === credentials.password) {
                document.getElementById('message').innerHTML = '<div class="success">Login successful!</div>';
                if(remember) {
                    localStorage.setItem('remembered', '1');
                    localStorage.setItem('loginCreds', JSON.stringify(credentials));
                } else {
                    localStorage.removeItem('remembered');
                }
                // Redirect via anchor tag
                setTimeout(function(){
                    let a = document.createElement('a');
                    a.href = 'form.html'; // Change to your file
                    a.innerText = 'Go to Welcome Page';
                    a.style.display = 'block';
                    a.style.textAlign = 'center';
                    a.style.marginTop = '20px';
                    document.getElementById('message').appendChild(a);
                }, 800);
            } else {
                document.getElementById('message').innerHTML = '<div class="error">Invalid username or password!</div>';
            }
        };

        // Change credentials button
        document.getElementById('change-btn').onclick = function() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('change-container').classList.remove('hidden');
            document.getElementById('change-message').innerHTML = '';
            document.getElementById('change-form').reset();
        };

        // Back to login
        document.getElementById('back-btn').onclick = function() {
            document.getElementById('change-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('message').innerHTML = '';
        };

        // Change credentials form submit
        document.getElementById('change-form').onsubmit = function(e) {
            e.preventDefault();
            const oldU = document.getElementById('old-username').value;
            const oldP = document.getElementById('old-password').value;
            const newU = document.getElementById('new-username').value;
            const newP = document.getElementById('new-password').value;
            if(oldU === credentials.username && oldP === credentials.password) {
                credentials.username = newU;
                credentials.password = newP;
                localStorage.setItem('loginCreds', JSON.stringify(credentials));
                document.getElementById('change-message').innerHTML = '<div class="success">Credentials changed successfully!</div>';
                setTimeout(function(){
                    document.getElementById('change-container').classList.add('hidden');
                    document.getElementById('login-container').classList.remove('hidden');
                    document.getElementById('message').innerHTML = '';
                    document.getElementById('username').value = newU;
                    document.getElementById('password').value = newP;
                }, 1200);
            } else {
                document.getElementById('change-message').innerHTML = '<div class="error">Old username or password incorrect!</div>';
            }
        };
    </script>
</body>
</html></form></div>
